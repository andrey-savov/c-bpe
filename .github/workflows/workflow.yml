name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag to release (e.g., v1.0.0)'
        required: false
        type: string

env:
  PYTHON_DEFAULT: "3.13"

jobs:
  # ============================================================
  # Test: C implementation (primary)
  # ============================================================
  test-c:
    name: Test C on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and install c_bpe
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
      - name: Test imports
        run: python tests/test_import.py
      - name: Run tests
        run: |
          pip install pytest
          pytest tests/test_basic.py -v
        continue-on-error: true

  # ============================================================
  # Test: Rust implementation (companion)
  # ============================================================
  test-rust:
    name: Test Rust on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build and install rs_bpe
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip maturin
          cd rust && maturin develop --release
        shell: bash
      - name: Test Rust imports
        run: |
          source .venv/bin/activate
          python -c "from rs_bpe.bpe import openai; t = openai.cl100k_base(); print('rs_bpe OK:', t.encode('hello'))"
        shell: bash

  # ============================================================
  # Release: Build C wheels
  # ============================================================
  build-c-wheels:
    name: Build C wheels (${{ matrix.os }} / ${{ matrix.python-version }})
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag != ''
    needs: [test-c]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.version_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Extract version from tag
        id: extract_version
        shell: bash
        run: |
          VERSION=$(echo "${{ github.event.inputs.version_tag }}" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version
        shell: bash
        run: |
          python -m pip install tomli
          python scripts/sync_version.py --set ${{ steps.extract_version.outputs.version }} || true

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: c-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  # ============================================================
  # Release: Build C sdist
  # ============================================================
  build-c-sdist:
    name: Build C source distribution
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag != ''
    needs: [test-c]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.version_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract version from tag
        id: extract_version
        shell: bash
        run: |
          VERSION=$(echo "${{ github.event.inputs.version_tag }}" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version
        shell: bash
        run: |
          python -m pip install tomli
          python scripts/sync_version.py --set ${{ steps.extract_version.outputs.version }} || true

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: c-sdist
          path: dist/*.tar.gz

  # ============================================================
  # Publish: c-bpe to TestPyPI (manual dispatch)
  # ============================================================
  publish-c-testpypi:
    name: Publish c-bpe to TestPyPI
    needs: [build-c-wheels, build-c-sdist]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag != ''
    steps:
      - name: Download C wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: c-wheel-*
          path: dist
          merge-multiple: true

      - name: Download C sdist
        uses: actions/download-artifact@v4
        with:
          name: c-sdist
          path: dist

      - name: List files to publish
        run: |
          ls -la dist/
          echo "Wheel count: $(find dist/ -name '*.whl' | wc -l)"
          echo "Sdist count: $(find dist/ -name '*.tar.gz' | wc -l)"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true
          skip-existing: true

  # ============================================================
  # Publish: c-bpe to PyPI (manual dispatch)
  # ============================================================
  publish-c-pypi:
    name: Publish c-bpe to PyPI
    needs: [build-c-wheels, build-c-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag != ''
    steps:
      - name: Download C wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: c-wheel-*
          path: dist
          merge-multiple: true

      - name: Download C sdist
        uses: actions/download-artifact@v4
        with:
          name: c-sdist
          path: dist

      - name: List files to publish
        run: |
          ls -la dist/
          echo "Wheel count: $(find dist/ -name '*.whl' | wc -l)"
          echo "Sdist count: $(find dist/ -name '*.tar.gz' | wc -l)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          skip-existing: false

  # ============================================================
  # GitHub Release (manual dispatch)
  # ============================================================
  github-release:
    name: Create GitHub Release
    needs: [build-c-wheels, build-c-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: extract_info
        shell: bash
        run: |
          VERSION=$(echo "${{ github.event.inputs.version_tag }}" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=${{ github.event.inputs.version_tag }}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          pattern: c-wheel-*
          path: artifacts
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: c-sdist
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        uses: softprops/action-gh-release@v2
        with:
          name: "c-bpe ${{ steps.extract_info.outputs.version }}"
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.version_tag }}
